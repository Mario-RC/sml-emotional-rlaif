### model
model_name_or_path: google/gemma-2-2b-it
adapter_name_or_path: saves/gemma-2-2b-it/lora/dpo_1ep
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: lora

### dataset
eval_dataset: ppo_unlabeled_prompts_dataset_test
template: gemma
cutoff_len: 2048
max_samples: 1000000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/gemma-2-2b-it/predict/dpo_1ep
overwrite_output_dir: true

### eval
per_device_eval_batch_size: 1
predict_with_generate: true
ddp_timeout: 180000000