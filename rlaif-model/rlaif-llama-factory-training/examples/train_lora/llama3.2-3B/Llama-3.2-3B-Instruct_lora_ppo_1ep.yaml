### model
model_name_or_path: meta-llama/Llama-3.2-3B-Instruct
adapter_name_or_path: saves/Llama-3.2-3B-Instruct/lora/sft_d_3ep
reward_model: saves/Llama-3.2-3B-Instruct/lora/rm_1ep
trust_remote_code: true

### method
stage: ppo
do_train: true
finetuning_type: lora
lora_target: all

### dataset
dataset: ppo_unlabeled_prompts_dataset
template: llama3
cutoff_len: 2048
max_samples: 1000000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/Llama-3.2-3B-Instruct/lora/ppo_1ep
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 8
auto_find_batch_size: true
gradient_checkpointing: true
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### generate
max_new_tokens: 512
top_k: 0
top_p: 0.9
